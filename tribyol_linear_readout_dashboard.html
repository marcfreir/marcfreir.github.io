<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TriBYOL — Linear Readout Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.1/plotly.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Helvetica Neue", Arial, sans-serif;
  font-size: 13px;
  background: #f5f4f0;
  color: #2c2c2a;
  min-height: 100vh;
}
header {
  background: white;
  border-bottom: 0.5px solid rgba(44,44,42,0.12);
  padding: 18px 32px 0;
}
header h1 {
  font-size: 17px;
  font-weight: 500;
  margin-bottom: 14px;
  color: #2c2c2a;
}
/* ── Main tabs ── */
.main-tabs {
  display: flex;
  gap: 0;
  border-bottom: none;
}
.main-tab {
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
  border: 0.5px solid transparent;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  color: #888780;
  background: transparent;
  transition: background 0.15s, color 0.15s;
  position: relative;
  top: 1px;
}
.main-tab:hover { color: #2c2c2a; background: rgba(44,44,42,0.04); }
.main-tab.active {
  color: #2c2c2a;
  font-weight: 500;
  background: white;
  border-color: rgba(44,44,42,0.12);
  border-bottom-color: white;
}
/* ── Content panels ── */
.panel { display: none; padding: 28px 32px; }
.panel.active { display: block; }
/* ── Config strip (training curves) ── */
.config-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}
.cfg-btn {
  padding: 5px 12px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 20px;
  border: 1.5px solid transparent;
  background: white;
  color: #5f5e5a;
  transition: all 0.15s;
  white-space: nowrap;
}
.cfg-btn:hover { color: #2c2c2a; background: #f0efe9; }
.cfg-btn.active {
  color: white !important;
  font-weight: 500;
}
/* ── Chart container ── */
.chart-box {
  background: white;
  border: 0.5px solid rgba(44,44,42,0.1);
  border-radius: 8px;
  padding: 16px 12px 12px;
}
/* ── Stats row ── */
.stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.stat-card {
  background: #f5f4f0;
  border-radius: 6px;
  padding: 10px 16px;
  min-width: 120px;
}
.stat-label { font-size: 11px; color: #888780; margin-bottom: 3px; }
.stat-value { font-size: 18px; font-weight: 500; }
/* ── Phase legend ── */
.phase-legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  font-size: 12px;
  color: #5f5e5a;
}
.phase-legend span {
  display: flex;
  align-items: center;
  gap: 5px;
}
.leg-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
</style>
</head>
<body>

<header>
  <h1>TriBYOL — Linear Readout Analysis</h1>
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('curves')">Training curves</button>
    <button class="main-tab" onclick="switchTab('ranking')">Config ranking</button>
    <button class="main-tab" onclick="switchTab('pvs')">Perf vs stability</button>
    <button class="main-tab" onclick="switchTab('metrics')">Final metrics</button>
  </div>
</header>

<!-- ════════════════════════════════════════════════════════════
     PANEL 1 — Training curves
═══════════════════════════════════════════════════════════════ -->
<div class="panel active" id="panel-curves">
  <div class="phase-legend" id="phaseLegend"></div>
  <div class="config-strip" id="cfgStrip"></div>
  <div class="stats-row" id="statsRow"></div>
  <div class="chart-box">
    <div id="chartCurve" style="width:100%;height:460px;"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     PANEL 2 — Ranking
═══════════════════════════════════════════════════════════════ -->
<div class="panel" id="panel-ranking">
  <div class="chart-box">
    <div id="chartRanking" style="width:100%;height:560px;"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     PANEL 3 — Perf vs Stability
═══════════════════════════════════════════════════════════════ -->
<div class="panel" id="panel-pvs">
  <div class="chart-box">
    <div id="chartPvs" style="width:100%;height:560px;"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════

<div class="panel" id="panel-metrics">
  <div class="chart-box">
    <div id="chartMetrics" style="width:100%;height:560px;"></div>

</div>

/* ── Helpers ── */
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function max_idx(arr) {
  let mi = 0;
  for (let i=1;i<arr.length;i++) if(arr[i]>arr[mi]) mi=i;
  return mi;
}

/* ── Tab switching ── */
let renderedTabs = new Set(['curves']);
function switchTab(name) {
  document.querySelectorAll('.main-tab').forEach((t,i) => {
    t.classList.toggle('active', ['curves','ranking','pvs','metrics'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (!renderedTabs.has(name)) {
    renderedTabs.add(name);
    if (name === 'ranking') buildRanking();
    if (name === 'pvs')     buildPvs();
    if (name === 'metrics') buildMetrics();
  }
  // Resize active chart
  const divMap = {curves:'chartCurve', ranking:'chartRanking', pvs:'chartPvs', metrics:'chartMetrics'};
  const el = document.getElementById(divMap[name]);
  if (el && el._fullLayout) Plotly.relayout(el, {});
}

    </div>
    <div class="stat-card">
      <div class="stat-label">vs ImageNet</div>
      <div class="stat-value" style="color:${gap_img>=0?'#1D9E75':'#D85A30'}">${gap_img>=0?'+':''}${gap_img}%</div>
    </div>
  `;
}

function buildCurveChart(cfg) {
  const d = TC_DATA[cfg];
  const n = d.epochs.length;

  const traces = [];

  /* baseline — random */
  traces.push({
    x: d.epochs, y: Array(n).fill(B_RAND),
    type:'scatter', mode:'lines', name: B_RLBL,
    yaxis:'y', xaxis:'x',
    line: {color:'#888780', width:1.6, dash:'solid'},
    hovertemplate: `<b>${B_RLBL}</b><br>mIoU = ${B_RAND.toFixed(2)}%<extra></extra>`,
  });

  /* baseline — ImageNet */
  traces.push({
    x: d.epochs, y: Array(n).fill(B_IMG),
    type:'scatter', mode:'lines', name: B_ILBL,
    yaxis:'y', xaxis:'x',
    line: {color:'#D85A30', width:1.6, dash:'solid'},
    hovertemplate: `<b>${B_ILBL}</b><br>mIoU = ${B_IMG.toFixed(2)}%<extra></extra>`,
  });

  /* individual runs */
  d.runs.forEach((run, ri) => {
    traces.push({
      x: run.x, y: run.y,
      type:'scatter', mode:'lines', name:`run ${ri+1}`,
      yaxis:'y', xaxis:'x',
      line: {color: hexToRgba(d.color, 0.22), width:1},
      hovertemplate:`<b>${d.label} run ${ri+1}</b><br>epoch %{x}<br>test mIoU = %{y:.2f}%<extra></extra>`,
    });
  });

  /* std band */
  traces.push({
    x: [...d.epochs, ...d.epochs.slice().reverse()],
    y: [...d.upper, ...d.lower.slice().reverse()],
    type:'scatter', mode:'lines', fill:'toself',
    fillcolor: hexToRgba(d.color, 0.11),
    line:{width:0}, hoverinfo:'skip',
    showlegend:false, name:'std band',
    yaxis:'y', xaxis:'x',
  });

  /* mean line */
  traces.push({
    x: d.epochs, y: d.mean,
    type:'scatter', mode:'lines', name:`${d.label} — mean`,
    yaxis:'y', xaxis:'x',
    line: {color:d.color, width:2.5},
    hovertemplate:`<b>${d.label}</b><br>epoch %{x}<br>test mIoU = %{y:.2f}%<extra></extra>`,
  });

  /* best-epoch star */
  traces.push({
    x:[d.best_ep], y:[d.best_val],
    type:'scatter', mode:'markers',
    name:`★ best  ep=${d.best_ep}  ${d.best_val.toFixed(2)}%`,
    yaxis:'y', xaxis:'x',
    marker:{color:d.color, size:11, symbol:'star', line:{color:'white',width:1.2}},
    hovertemplate:`best epoch=${d.best_ep}<br>test mIoU=${d.best_val.toFixed(2)}%<extra></extra>`,
  });

  /* pretrain loss (right axis) */
  if (d.loss_y.length > 0) {
    traces.push({
      x: d.loss_x, y: d.loss_y,
      type:'scatter', mode:'lines', name:'pretrain train loss',
      yaxis:'y2', xaxis:'x',
      line: {color: hexToRgba(d.color, 0.45), width:1.4, dash:'dot'},
      hovertemplate:'pretrain loss = %{y:.4f}<extra></extra>',
    });
  }

  const layout = {
    ...PLT_LAYOUT_BASE,
    margin: {l:70, r:200, t:40, b:60},
    hovermode:'x unified',
    xaxis:  {title:'linear probe epoch', gridcolor:'rgba(136,135,128,0.15)'},
    yaxis:  {title:'test mIoU (%)', ticksuffix:'%', gridcolor:'rgba(136,135,128,0.15)'},
    yaxis2: {title:'pretrain train loss', overlaying:'y', side:'right',
              showgrid:false, zeroline:false},
    legend: {orientation:'v', x:1.03, y:1, xanchor:'left', font:{size:11}},
  };

  const div = document.getElementById('chartCurve');
  Plotly.react(div, traces, layout, {responsive:true, displayModeBar:true});
}

function selectCfg(cfg) {
  /* deactivate old button */
  const old = document.getElementById('btn-' + activeCfg);
  if (old) { old.classList.remove('active'); old.style.background='white'; old.style.color='#5f5e5a'; }
  activeCfg = cfg;
  /* activate new button */
  const btn = document.getElementById('btn-' + cfg);
  if (btn) {
    btn.classList.add('active');
    btn.style.background = TC_DATA[cfg].color;
    btn.style.color = 'white';
  }
  updateStats(cfg);
  buildCurveChart(cfg);
}

/* ══════════════════════════════════════════════════════════════
   PANEL 2 — Ranking
══════════════════════════════════════════════════════════════ */
function buildRanking() {
  const labels = RANK_DATA.map(d => d.label);
  const means  = RANK_DATA.map(d => d.best);
  const stds   = RANK_DATA.map(d => d.std);
  const cols   = RANK_DATA.map(d => hexToRgba(d.color, 0.75));
  const ecols  = RANK_DATA.map(d => d.color);

  const traces = [{
    type:'bar', orientation:'h',
    x: means, y: labels,
    marker:{color:cols, line:{color:ecols, width:1.5}},
    error_x:{type:'data', array:stds, visible:true, color:'rgba(100,100,100,0.5)', thickness:1.5, width:4},
    customdata: RANK_DATA.map(d => `<b>${d.label}</b><br>best test mIoU = ${d.best.toFixed(2)}% ± ${d.std.toFixed(2)}%`),
    hovertemplate:'%{customdata}<extra></extra>',
  }];

  const layout = {
    ...PLT_LAYOUT_BASE,
    margin:{l:160, r:60, t:40, b:60},
    xaxis:{title:'best test mIoU (%)', ticksuffix:'%', gridcolor:'rgba(136,135,128,0.15)', range:[0,75]},
    yaxis:{tickfont:{size:11}},
    shapes:[
      {type:'line', xref:'x', yref:'paper', x0:B_RAND, x1:B_RAND, y0:0, y1:1,
        line:{color:'#888780', width:1.6, dash:'dot'}},
      {type:'line', xref:'x', yref:'paper', x0:B_IMG, x1:B_IMG, y0:0, y1:1,
        line:{color:'#D85A30', width:1.6, dash:'dash'}},
    ],
    annotations:[
      {xref:'x', yref:'paper', x:B_RAND, y:1.04, text:B_RLBL, showarrow:false,
        font:{size:10, color:'#888780'}, xanchor:'center'},
      {xref:'x', yref:'paper', x:B_IMG, y:1.04, text:B_ILBL, showarrow:false,
        font:{size:10, color:'#D85A30'}, xanchor:'center'},
    ],
    showlegend:false,
    height: Math.max(400, RANK_DATA.length * 26 + 100),
  };

  Plotly.newPlot('chartRanking', traces, layout, {responsive:true});
}

/* ══════════════════════════════════════════════════════════════
   PANEL 3 — Perf vs Stability
══════════════════════════════════════════════════════════════ */
function buildPvs() {
  const perfs = PVS_DATA.map(d => d.perf);
  const stabs = PVS_DATA.map(d => d.stab);
  const perfMed = [...perfs].sort((a,b)=>a-b)[Math.floor(perfs.length/2)];
  const stabMed = [...stabs].sort((a,b)=>a-b)[Math.floor(stabs.length/2)];
  const xMin = Math.min(...perfs) - 1, xMax = Math.max(...perfs) + 1;
  const yMin = 0, yMax = Math.max(...stabs) + 0.5;

  const traces = PVS_DATA.map(d => ({
    type:'scatter', mode:'markers+text',
    x:[d.perf], y:[d.stab],
    name:d.label,
    text:[d.label], textposition:'top right',
    textfont:{size:10, color:d.color},
    marker:{color:hexToRgba(d.color,0.85), size:13, line:{color:d.color,width:1.5}},
    customdata:[`<b>${d.label}</b><br>mean test mIoU = ${d.perf.toFixed(2)}%<br>mean std = ${d.stab.toFixed(3)}%<br>best epoch mIoU = ${d.best.toFixed(2)}%`],
    hovertemplate:'%{customdata}<extra></extra>',
  }));

  const layout = {
    ...PLT_LAYOUT_BASE,
    margin:{l:70, r:60, t:50, b:60},
    xaxis:{title:'mean test mIoU — all epochs (%)', ticksuffix:'%', range:[xMin,xMax], gridcolor:'rgba(136,135,128,0.15)'},
    yaxis:{title:'mean std (test mIoU) — lower = more stable', ticksuffix:'%', range:[yMin,yMax], gridcolor:'rgba(136,135,128,0.15)'},
    showlegend:false,
    height:560,
    shapes:[
      {type:'rect', xref:'x', yref:'y', x0:xMin,x1:perfMed, y0:stabMed,y1:yMax, fillcolor:'rgba(216,90,48,0.05)', line:{width:0}},
      {type:'rect', xref:'x', yref:'y', x0:perfMed,x1:xMax, y0:stabMed,y1:yMax, fillcolor:'rgba(216,90,48,0.02)', line:{width:0}},
      {type:'rect', xref:'x', yref:'y', x0:xMin,x1:perfMed, y0:yMin,y1:stabMed, fillcolor:'rgba(136,135,128,0.03)', line:{width:0}},
      {type:'rect', xref:'x', yref:'y', x0:perfMed,x1:xMax, y0:yMin,y1:stabMed, fillcolor:'rgba(29,158,117,0.06)', line:{width:0}},
      {type:'line', xref:'x', yref:'y', x0:perfMed,x1:perfMed, y0:yMin,y1:yMax, line:{color:'rgba(100,100,100,0.3)',width:1,dash:'dot'}},
      {type:'line', xref:'x', yref:'y', x0:xMin,x1:xMax, y0:stabMed,y1:stabMed, line:{color:'rgba(100,100,100,0.3)',width:1,dash:'dot'}},
    ],
    annotations:[
      {x:xMin+0.2, y:yMax-0.08, xref:'x', yref:'y', text:'low perf · high variance', showarrow:false, font:{size:10,color:'rgba(180,80,40,0.7)'}, xanchor:'left'},
      {x:perfMed+0.2, y:yMax-0.08, xref:'x', yref:'y', text:'★ high perf · high variance', showarrow:false, font:{size:10,color:'rgba(180,80,40,0.55)'}, xanchor:'left'},
      {x:xMin+0.2, y:stabMed-0.06, xref:'x', yref:'y', text:'low perf · stable', showarrow:false, font:{size:10,color:'rgba(100,100,100,0.6)'}, xanchor:'left'},
      {x:perfMed+0.2, y:stabMed-0.06, xref:'x', yref:'y', text:'★★ high perf · stable', showarrow:false, font:{size:10,color:'rgba(15,110,86,0.75)'}, xanchor:'left'},
    ],
  };

  Plotly.newPlot('chartPvs', traces, layout, {responsive:true});
}

/* ══════════════════════════════════════════════════════════════
   PANEL 4 — Final metrics
══════════════════════════════════════════════════════════════ */
function buildMetrics() {
  const traces = FM_SERIES.map(s => {
    const [r,g,b] = [parseInt(s.color.slice(1,3),16), parseInt(s.color.slice(3,5),16), parseInt(s.color.slice(5,7),16)];
    return {
      type:'bar', name:s.label,
      x:FM_LABELS, y:s.vals,
      marker:{color:`rgba(${r},${g},${b},0.75)`, line:{color:s.color, width:1}},
      error_y:{type:'data', array:s.stds, visible:true, color:'rgba(100,100,100,0.45)', thickness:1.2, width:3},
      customdata:FM_LABELS.map((l,i) => `<b>${l}</b><br>${s.label} = ${s.vals[i].toFixed(2)}% ± ${s.stds[i].toFixed(2)}%`),
      hovertemplate:'%{customdata}<extra></extra>',
    };
  });

  const layout = {
    ...PLT_LAYOUT_BASE,
    barmode:'group',
    margin:{l:70, r:60, t:70, b:130},
    xaxis:{title:'augmentation config', tickangle:-35, gridcolor:'rgba(136,135,128,0.15)'},
    yaxis:{title:'metric value (%)', ticksuffix:'%', gridcolor:'rgba(136,135,128,0.15)', range:[0,85]},
    legend:{orientation:'h', x:0.5, xanchor:'center', y:1.06, font:{size:11}},
    height:580,
    shapes:[
      {type:'line', xref:'paper', yref:'y', x0:0,x1:1, y0:B_RAND,y1:B_RAND, line:{color:'#888780',width:1.4,dash:'dot'}},
      {type:'line', xref:'paper', yref:'y', x0:0,x1:1, y0:B_IMG, y1:B_IMG,  line:{color:'#D85A30',width:1.4,dash:'dash'}},
    ],
    annotations:[
      {xref:'paper', yref:'y', x:1.01, y:B_RAND, text:B_RLBL, showarrow:false, font:{size:9,color:'#888780'}, xanchor:'left'},
      {xref:'paper', yref:'y', x:1.01, y:B_IMG,  text:B_ILBL, showarrow:false, font:{size:9,color:'#D85A30'}, xanchor:'left'},
    ],
  };

  Plotly.newPlot('chartMetrics', traces, layout, {responsive:true});
}

buildPhaseLegend();
buildCfgStrip();
selectCfg(CFG_ORDER[0]);
