<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: var(--color-background-primary);
    --bg2: var(--color-background-secondary);
    --bg3: var(--color-background-tertiary);
    --txt: var(--color-text-primary);
    --txt2: var(--color-text-secondary);
    --txt3: var(--color-text-tertiary);
    --brd: var(--color-border-tertiary);
    --accent: #3B7DD8;
    --accent2: #E85D24;
    --green: #2E9E6A;
    --amber: #C47A15;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--txt); background: transparent; padding: 0; }

  .root { padding: 8px 0 16px; }

  /* ── STAT CARDS ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--brd);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--txt3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card-value {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--txt);
    line-height: 1;
  }
  .card-sub {
    font-size: 11px;
    color: var(--txt3);
    margin-top: 4px;
    font-family: var(--font-mono);
  }
  .card.accent .card-value { color: var(--accent); }
  .card.green .card-value  { color: var(--green); }
  .card.orange .card-value { color: var(--accent2); }
  .card.amber .card-value  { color: var(--amber); }

  /* ── PHASE BREAKDOWN ── */
  .phase-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .phase-card {
    background: var(--bg2);
    border: 1px solid var(--brd);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .phase-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    padding: 2px 7px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .p1 { background: rgba(59,125,216,0.12); color: #3B7DD8; }
  .p2 { background: rgba(46,158,106,0.12); color: #2E9E6A; }
  .p3 { background: rgba(196,122,21,0.12); color: #C47A15; }
  .p4 { background: rgba(232,93,36,0.12);  color: #E85D24; }
  .phase-mean {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--txt);
  }
  .phase-detail {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--txt3);
    margin-top: 3px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .controls input {
    flex: 1;
    padding: 7px 11px;
    border: 1px solid var(--brd);
    border-radius: 7px;
    background: var(--bg2);
    color: var(--txt);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
  }
  .controls input:focus { border-color: var(--accent); }
  .filter-btns { display: flex; gap: 6px; }
  .filter-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--brd);
    background: var(--bg2);
    color: var(--txt2);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,125,216,0.08); }
  .filter-btn.p1.active { border-color:#3B7DD8; color:#3B7DD8; background:rgba(59,125,216,0.1); }
  .filter-btn.p2.active { border-color:#2E9E6A; color:#2E9E6A; background:rgba(46,158,106,0.1); }
  .filter-btn.p3.active { border-color:#C47A15; color:#C47A15; background:rgba(196,122,21,0.1); }
  .filter-btn.p4.active { border-color:#E85D24; color:#E85D24; background:rgba(232,93,36,0.1); }

  /* ── TABLE ── */
  .table-wrap { border: 1px solid var(--brd); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--bg3); }
  th {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--txt3);
    padding: 9px 14px;
    text-align: left;
    border-bottom: 1px solid var(--brd);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--txt); }
  th.sorted { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: 0.5; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr { border-bottom: 1px solid var(--brd); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }

  td {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--txt2);
    padding: 8px 14px;
    white-space: nowrap;
  }
  td.rank { color: var(--txt3); font-size: 11px; width: 36px; }
  td.config-name { color: var(--txt); font-size: 11px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
  td.miou-cell { color: var(--txt); font-weight: 600; }
  td.bar-cell { width: 120px; }
  .bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }

  .badge {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .count-note {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--txt3);
    margin-top: 8px;
    padding-left: 2px;
  }
</style>
</head>
<body>
<div class="root">

<div class="cards" id="stat-cards">
  <div class="card accent">
    <div class="card-label">Overall Mean mIoU</div>
    <div class="card-value" id="s-mean">—</div>
    <div class="card-sub" id="s-mean-sub">across all configs</div>
  </div>
  <div class="card green">
    <div class="card-label">Best Config</div>
    <div class="card-value" id="s-best">—</div>
    <div class="card-sub" id="s-best-sub">—</div>
  </div>
  <div class="card orange">
    <div class="card-label">Worst Config</div>
    <div class="card-value" id="s-worst">—</div>
    <div class="card-sub" id="s-worst-sub">—</div>
  </div>
  <div class="card amber">
    <div class="card-label">Range</div>
    <div class="card-value" id="s-range">—</div>
    <div class="card-sub" id="s-range-sub">max − min mIoU</div>
  </div>
</div>

<div class="phase-row" id="phase-row"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Filter by config name…">
  <div class="filter-btns">
    <button class="filter-btn active" data-phase="all">ALL</button>
    <button class="filter-btn p1" data-phase="1">P1</button>
    <button class="filter-btn p2" data-phase="2">P2</button>
    <button class="filter-btn p3" data-phase="3">P3</button>
    <button class="filter-btn p4" data-phase="4">P4</button>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="rank">#</th>
        <th data-col="config" class="sorted">Config <span class="sort-icon">↕</span></th>
        <th data-col="phase">Phase</th>
        <th data-col="mean" class="sorted">Mean mIoU <span class="sort-icon">↓</span></th>
        <th data-col="std">Std</th>
        <th data-col="runs">Runs</th>
        <th data-col="bar"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="count-note" id="count-note"></div>

</div>

const grouped = {};
for (const [key, val] of Object.entries(raw)) {
  const m = key.match(/^(.+)_run(\d+)_best_from_last$/);
  if (!m) continue;
  const config = m[1];
  if (!grouped[config]) grouped[config] = [];
  grouped[config].push(val.miou * 100);
}

function mean(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
function std(arr)  { const m=mean(arr); return Math.sqrt(arr.map(x=>(x-m)**2).reduce((a,b)=>a+b,0)/arr.length); }
function getPhase(c) { const m=c.match(/^Phase(\d+)/); return m?parseInt(m[1]):0; }

const PHASE_COLORS = { 1:'#3B7DD8', 2:'#2E9E6A', 3:'#C47A15', 4:'#E85D24' };
const PHASE_TAGS   = { 1:'p1', 2:'p2', 3:'p3', 4:'p4' };

let configs = Object.keys(grouped).map(config => ({
  config,
  phase: getPhase(config),
  mean: mean(grouped[config]),
  std: std(grouped[config]),
  runs: grouped[config].length,
}));

// Sort by mean desc
configs.sort((a,b) => b.mean - a.mean);

const globalMean = mean(configs.map(c=>c.mean));
const best  = configs[0];
const worst = configs[configs.length-1];
const rng   = best.mean - worst.mean;

// Short label
function shortName(c) {
  return c.replace(/^Phase\d+_/,'').replace(/_run\d+.*/,'');
}

// ── Fill stat cards ──
document.getElementById('s-mean').textContent     = globalMean.toFixed(2)+'%';
document.getElementById('s-mean-sub').textContent = `σ = ${std(configs.map(c=>c.mean)).toFixed(2)}% across ${configs.length} configs`;
document.getElementById('s-best').textContent     = best.mean.toFixed(2)+'%';
document.getElementById('s-best-sub').textContent = shortName(best.config);
document.getElementById('s-worst').textContent    = worst.mean.toFixed(2)+'%';
document.getElementById('s-worst-sub').textContent= shortName(worst.config);
document.getElementById('s-range').textContent    = rng.toFixed(2)+'%';

// ── Phase breakdown ──
const phaseData = {};
for (const c of configs) {
  if (!phaseData[c.phase]) phaseData[c.phase] = [];
  phaseData[c.phase].push(c.mean);
}
const phaseRow = document.getElementById('phase-row');
for (const [ph, vals] of Object.entries(phaseData).sort((a,b)=>a[0]-b[0])) {
  const m = mean(vals), s = std(vals);
  const div = document.createElement('div');
  div.className = 'phase-card';
  div.innerHTML = `
    <span class="phase-tag ${PHASE_TAGS[ph]}">PHASE ${ph}</span>
    <div class="phase-mean">${m.toFixed(2)}%</div>
    <div class="phase-detail">σ=${s.toFixed(2)}%  n=${vals.length}  best=${Math.max(...vals).toFixed(2)}%</div>
  `;
  phaseRow.appendChild(div);
}

// ── Table rendering ──
const tbody = document.getElementById('tbody');
const minMean = worst.mean, maxMean = best.mean;
let sortCol = 'mean', sortDir = -1;
let filterPhase = 'all', filterText = '';

function render() {
  let rows = [...configs];
  if (filterPhase !== 'all') rows = rows.filter(r => r.phase == filterPhase);
  if (filterText) rows = rows.filter(r => r.config.toLowerCase().includes(filterText.toLowerCase()));

  if (sortCol === 'config') rows.sort((a,b) => sortDir*(a.config.localeCompare(b.config)));
  else if (sortCol === 'mean')  rows.sort((a,b) => sortDir*(a.mean - b.mean));
  else if (sortCol === 'std')   rows.sort((a,b) => sortDir*(a.std - b.std));
  else if (sortCol === 'phase') rows.sort((a,b) => sortDir*(a.phase - b.phase));

  // Re-rank in displayed order
  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const pct = ((r.mean - minMean)/(maxMean - minMean)*100).toFixed(1);
    const color = PHASE_COLORS[r.phase] || '#888';
    const tag = PHASE_TAGS[r.phase] || '';
    const globalRank = configs.indexOf(r) + 1;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank">${globalRank}</td>
      <td class="config-name" title="${r.config}">${shortName(r.config)}</td>
      <td><span class="badge ${tag}" style="background:${color}18;color:${color}">P${r.phase}</span></td>
      <td class="miou-cell">${r.mean.toFixed(3)}%</td>
      <td>${r.std.toFixed(3)}%</td>
      <td>${r.runs}</td>
      <td class="bar-cell">
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('count-note').textContent = `Showing ${rows.length} of ${configs.length} configs`;
}

// ── Sort headers ──
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = -1; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = sortDir === -1 ? '↓' : '↑';
    render();
  });
});

// ── Filter buttons ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filterPhase = btn.dataset.phase;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── Search ──
document.getElementById('search').addEventListener('input', e => {
  filterText = e.target.value;
  render();
});

render();
</script>
</body>
</html>
